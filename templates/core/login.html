<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Login</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <!-- Bulma CSS -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
        
        <!-- Font Awesome Icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        
        <style>
            /* Custom CSS para a paleta de azul claro */
            body {
                background: linear-gradient(135deg, #e3f2fd 0%, #bbdef5 100%);
                min-height: 100vh;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            
            .login-container {
                max-width: 450px;
                margin: 50px auto;
                padding: 20px;
            }
            
            .login-card {
                background: white;
                border-radius: 20px;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
                overflow: hidden;
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }
            
            .login-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            }
            
            .login-header {
                background: linear-gradient(135deg, #42a5f5 0%, #1e88e5 100%);
                padding: 40px 30px;
                text-align: center;
                color: white;
            }
            
            .login-header h1 {
                font-size: 2.5rem;
                font-weight: 700;
                margin-bottom: 10px;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            }
            
            .login-header p {
                font-size: 1rem;
                opacity: 0.9;
                margin-bottom: 0;
            }
            
            .login-body {
                padding: 40px 30px;
            }
            
            /* Estilização personalizada dos campos do formulário */
            .login-body .field {
                margin-bottom: 25px;
            }
            
            .login-body .label {
                color: #1565c0;
                font-weight: 600;
                font-size: 0.9rem;
                margin-bottom: 8px;
            }
            
            .login-body .input {
                border: 2px solid #e0e0e0;
                border-radius: 12px;
                padding: 12px 16px;
                font-size: 1rem;
                transition: all 0.3s ease;
                background-color: #fafafa;
            }
            
            .login-body .input:focus {
                border-color: #42a5f5;
                box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.2);
                background-color: white;
            }
            
            .login-body .input:hover {
                border-color: #90caf9;
            }
            
            .login-button {
                background: linear-gradient(135deg, #42a5f5 0%, #1e88e5 100%);
                border: none;
                border-radius: 12px;
                padding: 14px;
                font-size: 1.1rem;
                font-weight: 600;
                width: 100%;
                transition: all 0.3s ease;
                color: white;
                cursor: pointer;
            }
            
            .login-button:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(66, 165, 245, 0.3);
                background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            }
            
            .login-button:active {
                transform: translateY(0);
            }
            
            .error-message {
                background-color: #ffebee;
                border-left: 4px solid #f44336;
                border-radius: 8px;
                padding: 12px 16px;
                margin-top: 20px;
                color: #c62828;
                font-size: 0.9rem;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            
            .error-message i {
                font-size: 1.2rem;
            }
            
            .login-footer {
                text-align: center;
                padding: 20px 30px;
                background-color: #f8f9fa;
                border-top: 1px solid #e0e0e0;
            }
            
            .login-footer a {
                color: #42a5f5;
                text-decoration: none;
                font-weight: 500;
                transition: color 0.3s ease;
            }
            
            .login-footer a:hover {
                color: #1e88e5;
                text-decoration: underline;
            }
            
            /* Estilização para os campos do Django form.as_p */
            .login-body p {
                margin-bottom: 20px;
            }
            
            .login-body p label {
                color: #1565c0;
                font-weight: 600;
                font-size: 0.9rem;
                margin-bottom: 8px;
                display: block;
            }
            
            .login-body p input {
                width: 100%;
                border: 2px solid #e0e0e0;
                border-radius: 12px;
                padding: 12px 16px;
                font-size: 1rem;
                transition: all 0.3s ease;
                background-color: #fafafa;
            }
            
            .login-body p input:focus {
                border-color: #42a5f5;
                box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.2);
                background-color: white;
                outline: none;
            }
            
            .login-body p input:hover {
                border-color: #90caf9;
            }
            
            /   }
                
                .login-body {
                    padding: 30px 20px;
                }
            }
            
            /* Animações */
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            .login-card {
                animation: fadeInUp 0.6s ease-out;
            }
        </style>
    </head>
    <body>
        <!--[if lt IE 7]>
            <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="#">upgrade your browser</a> to improve your experience.</p>
        <![endif]-->

        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <i class="fas fa-lock" style="font-size: 3rem; margin-bottom: 15px;"></i>
                    <h1>Bem-vindo</h1>
                    <p>Faça login para acessar sua conta</p>
                </div>
                
                <div class="login-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        {% if form.errors %}
                        <div class="error-message">
                            <i class="fas fa-exclamation-circle"></i>
                            <span>Usuário ou senha inválidos</span>
                        </div>
                        {% endif %}
                        
                        {{ form.as_p }}
                        
                        <div class="field" style="margin-top: 30px;">
                            <button type="submit" class="login-button">
                                <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                                Entrar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="" async defer></script>
    </body>
</html>
