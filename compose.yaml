version: '3.8'

services:
  web:
    build: .
    container_name: django_app
    command: >
      sh -c "python wait_for_db.py &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn sistemaortho.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
